 When tasks land in the Review column, inspect the changes and approve. Your feature is ready. ## What to Keep - Keep the Formic logo at the very top (`images/formic.png`) — centered, same style as current. - Keep the npm / Node.js / License / Live Demo badges row. - Keep one short tagline (e.g., \"Formic — AI-powered Kanban that turns goals into shipped features.\"). - Keep a minimal \"Requirements\" section: Node.js 20+, npm, a supported AI agent CLI (Claude Code CLI or GitHub Copilot CLI). - Keep the MIT License line at the bottom. ## What to Remove - All screenshot images and their `<img>`/`![](...)` references - Feature deep-dives (DAG, lease system, self-healing, memory, tool forging, settings, multi-workspace, light theme) - Live demo section with iframe - Architecture / technical details - Any sections beyond the 8-step flow, requirements, and license ## Acceptance Criteria - `README.md` is under 100 lines - No image references remain except the logo - Demo video is embedded at the top with fallback link - The 8-step onboarding flow is present and accurate - Badges are preserved - File renders correctly in GitHub markdown preview (verify heading levels, code blocks, HTML tags)"
