          - generic [ref=e1695]: "Implements Phase 5 of docs/TOKEN_USAGE_TRANSCRIPT_PLAN.md. UI only — renders per-card token/cost badges on Kanban cards and a usage dashboard panel with model/task/session breakdowns and cache-hit stats. Consumes the endpoints from Phase 2 and the data flow from Phase 4. RE-VERIFY all line anchors before editing; they drift. Depends on Phase 4 (taskUsageMap + refreshUsageBadges) and Phase 2 (endpoints). === MODIFIED FILE: src/client/index.html === 1. BADGES: In renderBoard()'s card construction (~line 9253), render a compact badge on each card from taskUsageMap[task.id], e.g. '⚡ 12.3k · $0.04' (format tokens with k/M suffixes; show cost only when estCostUsd is non-null). Tooltip (title attr or existing tooltip pattern) shows the input / output / cache-read / cache-write split and cache-hit % computed as cacheRead / (input + cacheRead) (token-monitor's cache-hit concept; guard divide-by-zero -> show 0% or n/a). Render NO badge when the task has no usage entry (plan flag F5 — e.g. copilot or not-yet-run tasks). 2. Wire refreshUsageBadges (the Phase 4 stub): after updating taskUsageMap, re-render or patch the affected cards' badges (by task id) instead of only console.debug. 3. DASHBOARD PANEL: Add a slide-over/panel modeled on the existing settings panel markup (find the settings panel / #settings-panel slide-over and clone its open/close pattern), opened from a header button. Contents: a period toggle (Today / Month / All), a groupBy toggle (Model / Task / Session), and a table of GroupSummary rows showing tokens, estimated cost with a small 'estimated' disclaimer (costBasis === 'ESTIMATED'), and cache-hit %. Fetch from /api/usage/summary?period=&groupBy= on open and on toggle change; also refresh on the 'usage-updated' WS frame while open. You MAY reuse layout ideas from `git show main-usage-proxy -- src/client/index.html` where they fit, but the endpoints and field names differ from that branch — follow THIS plan's API (Phase 2). === NEW FILE: e2e/usage-dashboard.spec.ts === Adapt from `git show main-usage-proxy:e2e/usage-dashboard.spec.ts`. Seed .formic/usage/events.ndjson with a couple of known UsageEvents (new transcript shape), load the board, assert a card badge shows the expected token/cost text, open the dashboard panel, and assert the model/task rows and a cache-hit % render. Playwright is Chromium-only, sequential, against a separately-started server (see existing e2e config). === PROJECT CONSTRAINTS === Client index.html is vanilla JS + Tailwind (CDN) matching the existing embedded style — match surrounding conventions, no framework, no new client deps. e2e spec: @playwright/test (already a dev dep), TypeScript, ESM. No new npm dependencies. Tables only — NO chart/graph library (a chart is a future task; adding a dep needs approval). === DO NOT in this task === No server-side changes at all (endpoints already exist from Phase 2). Do not add a charting library. Do not change the collector, store, or notifier. === VERIFICATION GATE === `npx tsc --noEmit` clean; `npm test` green; `npx playwright test` (server started separately) green including the new usage-dashboard spec. === DEPENDS ON Phase 4 (and Phase 2) === Requires taskUsageMap + refreshUsageBadges (Phase 4) and the /api/usage/summary|tasks endpoints (Phase 2). Queue ONLY after Phase 4 is merged. Do not run in parallel. === SELF-HOSTING WARNING === This task edits only the client and e2e (no src/server/**), so the tsx-watch restart hazard does not directly apply — but still run the e2e suite against a separately-started server per the existing Playwright setup."
