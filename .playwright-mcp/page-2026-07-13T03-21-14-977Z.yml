        - generic [ref=e796]:
          - heading "AI Assistant" [level=2] [ref=e797]
          - paragraph [ref=e798]: The AI Assistant is a chat panel in the bottom-right corner of the board. It is context-aware — it knows your current codebase and board state — and can help with brainstorming, task creation, and answering questions.
          - heading "Opening and Closing" [level=3] [ref=e799]
