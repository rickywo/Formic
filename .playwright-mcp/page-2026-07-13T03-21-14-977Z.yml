          - generic [ref=e2123]: "Implements Phase 1 of docs/TOKEN_USAGE_PROXY_PLAN.md — a local loopback HTTP proxy that forwards agent LLM requests untouched to Anthropic and attributes them via a URL path prefix. NO usage parsing yet (Phase 2), NO spawn wiring yet (Phase 3). This is new code plus small config plumbing; zero change to existing behavior. ## Constraints (project rules) - Pure ESM: all relative imports MUST end in .js; use node: prefix for builtins (node:http, node:https, node:url). - TypeScript strict: no `any`; use `unknown` + guards. `import type` for type-only imports. - NO new npm dependencies — use node:http / node:https only. - Log prefix `[TokenProxy]` on every console.warn/error. No console.log. No empty catch. - Never log, store, or stringify request/response bodies or the `authorization` / `x-api-key` headers. ## New file: src/server/proxy/upstreams.ts Export interface UpstreamAdapter { name: 'anthropic'; baseUrl: string; isStreaming(contentType: string | undefined): boolean }. Export const anthropicAdapter: UpstreamAdapter = { name: 'anthropic', baseUrl: process.env.FORMIC_PROXY_UPSTREAM_ANTHROPIC ?? 'https://api.anthropic.com', isStreaming: (ct) => (ct ?? '').includes('text/event-stream') }. Export function resolveUpstream(): UpstreamAdapter { return anthropicAdapter; } (single provider today; this is the seam for future providers). ## New file: src/server/proxy/tokenProxy.ts (plain node:http server — NOT Fastify) - Module state: `let server: http.Server | null = null;` and `let usageCb: ((chunk, meta) => void) | null = null` (the onUsageEvent hook; Phase 2 will use it — in Phase 1 just store it and expose the setter, do not call it). - `const PATH_RE = /^\\/a\\/([\\w.-]+)\\/t\\/([\\w.-]+)(\\/.*)$/;` extracts agentId (group 1), taskId (group 2), upstreamPath (group 3, always starts with /). - Request handler: - If method === 'GET' and url === '/healthz' → respond 200 JSON {\"status\":\"ok\"}. Return. - Match req.url against PATH_RE. If no match → respond 404 (plain), do NOT forward (prevents open-proxy abuse). Return. - Resolve adapter via resolveUpstream(). Build upstream URL = adapter.baseUrl + upstreamPath. Parse with new URL(). - Create the upstream request with https.request({ hostname, port:443, path: url.pathname + url.search, method: req.method, headers: { ...req.headers, host: url.hostname } }). Copy ALL req.headers verbatim except rewrite `host` to the upstream hostname. Do NOT delete or inspect authorization/x-api-key — pass through untouched. - Pipe request body: req.pipe(upstreamReq). - On upstreamRes: write res.writeHead(upstreamRes.statusCode, upstreamRes.headers) copying status + ALL response headers verbatim, then upstreamRes.pipe(res) FIRST (client pipe must never wait on anything else). - Error handling: upstreamReq.on('error', ...) → console.warn('[TokenProxy] upstream error:', msg) and if !res.headersSent respond 502; req.on('error', ...) likewise. Never throw out of the handler (no crash). - server.on('clientError', (err, socket) => { socket.destroy(); }) to avoid crashes on malformed client requests. - Exports: - `export function startTokenProxy(port: number): Promise<void>` — creates the server, `server.listen(port, '127.0.0.1')` (host is a hard-coded literal, NEVER configurable — must not bind non-loopback), resolves on 'listening', rejects on 'error' (e.g. EADDRINUSE). - `export function stopTokenProxy(): Promise<void>` — resolves after server.close(); sets server = null. - `export function isTokenProxyRunning(): boolean` — returns server !== null && server.listening. - `export function onUsageEvent(cb): void` — stores the callback in usageCb (used in later phases; harmless no-op wiring now). Type the cb loosely for now: `(chunk: Buffer, meta: { agentId: string; taskId: string; upstreamPath: string; method: string; reqHeaders: unknown; resHeaders: unknown; statusCode: number }) => void` OR keep a minimal signature and refine in Phase 2 — pick one and keep it consistent. ## Modified: src/types/index.ts Extend the existing ConfigSettings interface (find `export interface ConfigSettings`) by adding two OPTIONAL fields near the other optional settings: /** Token-usage proxy: master switch. Default true. */ usageProxyEnabled?: boolean; /** Token-usage proxy port (loopback only). Default 8790. */ usageProxyPort?: number; ## Modified: src/server/services/engineConfig.ts Mirror the existing pattern used for other settings (e.g. maxExecuteIterations / stepModels): - Add to the EngineConfig interface: `usageProxyEnabled: boolean;` and `usageProxyPort: number;`. - Add to the `engineConfig` default object: `usageProxyEnabled: true,` and `usageProxyPort: 8790,`. - In refreshEngineConfig(): `engineConfig.usageProxyEnabled = s.usageProxyEnabled ?? true;` and `engineConfig.usageProxyPort = s.usageProxyPort ?? 8790;` (s is config.settings). ## Modified: src/server/routes/config.ts - Add 'usageProxyEnabled' and 'usageProxyPort' to BOTH validKeys arrays (the GET /api/config/settings/:key handler and the PUT handler). - In the PUT handler add validation: if key === 'usageProxyPort', reject (400) unless value is an integer in [1024, 65535]; if key === 'usageProxyEnabled', reject (400) unless typeof value === 'boolean'. ## Modified: .env.example Add a documented line under a new `# === Token Usage Proxy ===` section: `# FORMIC_USAGE_PROXY_PORT=8790` and a comment that the UI setting (Settings) takes precedence over this env seed, matching the AGENT_TYPE precedence convention. (No wiring of this env var into engineConfig is required in Phase 1 — the setting is the source of truth; the env line is documentation of the intended seed only. If you add env seeding, do it in engineConfig defaults consistently.) ## Do NOT do in this task - Do NOT modify any spawn site (runner.ts / workflow.ts / assistantManager.ts / messagingAI.ts) — that is Phase 3. - Do NOT create usageParser.ts or usageStore.ts. - Do NOT start the proxy from index.ts yet — that is Phase 3. The proxy is startable but not yet started by the server. ## Verification (must pass before marking done) 1. `npx tsc --noEmit` clean. 2. `npm test` still 172/172 (no regressions). 3. Manual smoke: in a scratch script, `import { startTokenProxy, isTokenProxyRunning } from './dist/server/proxy/tokenProxy.js'`, start on 8790, curl `http://127.0.0.1:8790/healthz` → 200 {\"status\":\"ok\"}; curl `http://127.0.0.1:8790/v1/messages` (no /a/../t/.. prefix) → 404. If an ANTHROPIC key is available, forward a real /v1/messages through `/a/test/t/t-0/v1/messages` and confirm the JSON body matches a direct call byte-for-byte (modulo request id). Streaming request (stream:true) arrives incrementally. ## Acceptance criteria - Proxy forwards method, path, body, and all headers untouched; response status + headers copied verbatim; streaming stays streaming (piped, unbuffered). - Non-/a/:id/t:id paths (except /healthz) return 404 without forwarding. - Proxy binds 127.0.0.1 only (verify it is NOT reachable on the machine's LAN IP). - Config setting/round-trips through GET/PUT /api/config/settings/usageProxyPort with validation. - tsc clean, existing tests green."
