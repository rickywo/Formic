          - generic [ref=e2050]: "## Goal Formic is about to be published to npm (@rickywo/formic) and as a public Docker image. Harden the release surface so no sensitive data or irrelevant files ship, the published image is safe for strangers to run, and the two app-level gaps found in the security review are closed. Findings already verified: the npm tarball (files whitelist) is clean; .env is excluded from git/npm/docker; the non-loopback FORMIC_AUTH_TOKEN guard exists in src/server/index.ts:70-150. ## A. Docker images (replace the draft ubuntu:24.04 Dockerfile — do NOT adopt it as-is) **1. Runtime image — rewrite the existing Dockerfile (repo root):** - Base: `node:22-slim` pinned by digest (e.g. `node:22-slim@sha256:<digest>`; record the digest and a comment on how to bump it). - Install the published package OR copy the built app as now, but: `npm ci --omit=dev`, keep prod-deps-only layout. - Pin the agent CLI: `npm install -g @anthropic-ai/claude-code@<exact-version>` (choose latest stable at implementation time). Optionally also `opencode-ai@<version>` — NOTE the real npm package is `opencode-ai`, not `opencode` (also fix the wrong install hint 'npm install -g opencode' in src/server/utils/banner.ts:120 while here). - Do NOT install: sudo, vim, zsh, jq, gnupg, oh-my-zsh, starship. No `curl | bash` / `curl | sh` pipelines anywhere. If git is required by the agent workflow at runtime (it is — auto-save commits), install git via apt with `--no-install-recommends` and clean apt lists in the same layer. - Run as the existing non-root `node` user: chown /app and the workspace dir, then `USER node` before CMD. No sudoers entries of any kind. - Use `ARG DEBIAN_FRONTEND=noninteractive` (ARG, not ENV) for any apt layer. - Keep/extend: EXPOSE 8000, the existing HEALTHCHECK against /api/board, `ENV HOST=0.0.0.0` is NOT set here — compose sets it explicitly; default stays loopback so a bare `docker run` without -e HOST cannot expose an unauthenticated API even accidentally. - Add OCI labels: org.opencontainers.image.source, .version, .licenses, .description. - Never ARG/ENV any secret (ANTHROPIC_API_KEY, FORMIC_AUTH_TOKEN, TELEGRAM_BOT_TOKEN, LINE_*) at build time; add a comment block documenting that secrets are runtime-only. **2. Dev-container image — NEW file Dockerfile.devcontainer:** A separate variant for people who want an interactive shell (the intent of the user's ubuntu draft), published under a `-devcontainer` tag. Requirements: base `node:22-bookworm` (full, pinned by digest) instead of ubuntu+NodeSource (removes the NodeSource `curl | bash`); create `developer` user WITHOUT any sudoers entry (no NOPASSWD:ALL — if privileged ops are needed at build time do them as root before `USER developer`); zsh/git/jq/vim allowed here via apt with --no-install-recommends; oh-my-zsh/starship optional but ONLY via pinned release-tag downloads with checksum verification — never `curl | sh` as root, never sudo in the image; global agent CLIs pinned by exact version: @anthropic-ai/claude-code, opencode-ai, @rickywo/formic; do NOT install `codewhale` — it is an unrelated third-party package (single independent maintainer) and a supply-chain risk; if another agent CLI was intended, it must be explicitly approved and pinned; WORKDIR /workspace owned by developer; CMD [\"zsh\"] is acceptable for this variant; document in README that this image is for interactive development, not headless deployment. **3. docker-compose.yml:** keep the FORMIC_AUTH_TOKEN :? enforcement (already correct). Add `read_only: true` root FS with a tmpfs for /tmp if compatible with the runner, or document why not; add `security_opt: [no-new-privileges:true]` and a memory limit example. Point image: at the published registry image with a pinned tag. ## B. Release CI guardrails — NEW .github/workflows/release.yml (plus reusable checks in the existing CI if one exists under .github/) - **Secret scan:** run gitleaks (default ruleset) against the full history on every push and as a release gate. - **npm tarball audit:** run `npm pack --dry-run --json` and fail if any file outside the allowlisted roots (dist/, src/client/, skills/, templates/, README.md, LICENSE, package.json) appears; store the file list as a build artifact for auditability. - **npm publish:** `npm publish --provenance --access public` from CI with an npm token scoped to the package (document: enable 2FA + automation token on the npm account; never publish from a laptop). - **Docker build:** hadolint on both Dockerfiles; build with docker buildx including `--sbom=true --provenance=true`; scan the built image with trivy (fail on HIGH/CRITICAL fixable vulns); push both tags (`<version>`, `<version>-devcontainer`) plus `latest` only on tagged releases. - Trigger: on version tags (v*). Keep workflow permissions minimal (contents: read, id-token: write for provenance). ## C. App-level fixes (small, but required before public distribution) **4. src/server/index.ts (~line 142-150):** replace the string comparison of the Authorization header with a constant-time comparison using `crypto.timingSafeEqual` (hash both sides with sha256 first so lengths match; import from 'node:crypto'). Behavior otherwise unchanged: 401 on mismatch, hook only registered when non-loopback. **5. Telegram webhook authentication:** src/server/routes/webhooks.ts POST /api/webhooks/telegram (~line 33) currently accepts any well-formed body. Add secret validation: when setting the webhook (setTelegramWebhook in src/server/services/telegramAdapter.ts), generate/pass a `secret_token` (support env TELEGRAM_WEBHOOK_SECRET, else derive a random one persisted alongside messaging state); on incoming updates, require the `X-Telegram-Bot-Api-Secret-Token` header to match (constant-time compare) and return 401 otherwise. Follow the existing LINE signature-verification pattern in the same file (rawBody route config not needed for Telegram — header check only). Update .env.example with TELEGRAM_WEBHOOK_SECRET. ## D. Repo/docs hygiene **6. .env.example:** ensure it documents TELEGRAM_WEBHOOK_SECRET and reiterates that .env must never be committed. **7. README.md:** add a 'Deploying publicly' section: the API executes code by design; loopback default; FORMIC_AUTH_TOKEN requirement; runtime-only secrets for Docker; which image tag to use (runtime vs -devcontainer). **8. package.json:** fill in the empty `author` field; verify `files` whitelist unchanged. **9. Do NOT commit or modify the local .env** (contains a live credential being rotated by the user; it is already gitignored). ## Constraints - TypeScript strict, pure ESM with .js import extensions, `import type` for type-only imports, no new npm dependencies (gitleaks/trivy/hadolint run in CI only, not as package deps), async fs only, console.warn/error with [ServiceName] prefixes, routes delegate to services, no changes under skills/. ## Acceptance criteria 1. `docker build .` produces an image that runs as non-root (`docker run --rm <img> whoami` != root), starts formic bound to 127.0.0.1 by default, and refuses 0.0.0.0 without FORMIC_AUTH_TOKEN (existing guard verified inside the container). 2. Neither Dockerfile contains: sudoers entries, `curl | bash`/`curl | sh`, unpinned base images, unpinned global npm installs, `codewhale`, or build-time secrets. hadolint passes on both. 3. `npm pack --dry-run` file list contains only the allowlisted roots; the CI tarball-audit job fails if a new root sneaks in (verify by test). 4. gitleaks over full history reports no findings (current history is clean — keep it that way as a gate). 5. Auth header comparison uses timingSafeEqual; python API tests still pass with FORMIC_AUTH_TOKEN set on a non-loopback bind (add a test if none covers 401/200 paths). 6. Telegram webhook returns 401 without the correct X-Telegram-Bot-Api-Secret-Token when a secret is configured, 200 with it; LINE behavior unchanged. Add python API test coverage. 7. `npx tsc --noEmit` passes; `python test/run_tests.py` passes; release workflow YAML validates (actionlint or `gh workflow view` dry check)."
