        - generic [ref=e821]:
          - heading "Lease-Based Concurrency" [level=2] [ref=e822]
          - paragraph [ref=e823]:
            - text: Formic can run multiple tasks in parallel. To prevent conflicting writes, it uses a
            - strong [ref=e824]: file lease system
            - text: managed by
            - code [ref=e825]: leaseManager.ts
            - text: .
          - heading "File Declaration" [level=3] [ref=e826]
          - paragraph [ref=e827]:
            - text: During the
            - strong [ref=e828]: Declaring
            - text: "stage, a task explicitly declares which files it will touch:"
          - list [ref=e829]:
            - listitem [ref=e830]:
              - strong [ref=e831]: Exclusive leases
              - text: — files the task will write to. Only one task can hold an exclusive lease on a file at a time.
            - listitem [ref=e832]:
              - strong [ref=e833]: Shared leases
              - text: — files the task will only read. Multiple tasks can hold shared leases on the same file simultaneously.
          - heading "Task Yielding" [level=3] [ref=e834]
          - paragraph [ref=e835]:
            - text: When a task requests an exclusive lease on a file that is already held exclusively by another running task, it
            - strong [ref=e836]: yields
            - text: — it pauses and re-queues itself to wait. Once the conflicting lease is released, the yielded task is picked up again automatically.
          - heading "Optimistic Concurrency for Shared Files" [level=3] [ref=e837]
          - paragraph [ref=e838]:
            - text: "Shared-lease files use optimistic concurrency: conflicts are detected at merge time via"
            - code [ref=e839]: git hash-object
            - text: collision detection. If two tasks read the same file and both modify it, the second to merge will detect the collision and trigger a resolution step.
          - heading "Lease Expiration & Watchdog" [level=3] [ref=e840]
          - paragraph [ref=e841]: "Leases expire after a configurable duration (default: 5 minutes). A background watchdog process periodically cleans up expired leases to prevent deadlocks if a task crashes without releasing its leases."
        - generic [ref=e842]:
          - heading "Self-Healing QA Loop" [level=2] [ref=e843]
          - paragraph [ref=e844]:
            - text: After a task finishes execution, Formic optionally runs a
            - strong [ref=e845]: Verifier
            - text: step that checks the implementation before it reaches Review. If verification fails, a
            - strong [ref=e846]: Critic
            - text: automatically creates a fix task.
          - heading "Verifier Step" [level=3] [ref=e847]
          - list [ref=e848]:
            - listitem [ref=e849]: Runs automatically after the Running stage when self-healing is enabled.
            - listitem [ref=e850]: Checks that the implementation meets the acceptance criteria defined in the task's brief.
            - listitem [ref=e851]:
              - text: The task enters the
              - strong [ref=e852]: Verifying
              - text: stage during this check.
          - heading "Critic & Auto-Fix" [level=3] [ref=e853]
          - list [ref=e854]:
            - listitem [ref=e855]: If verification fails, the Critic skill generates a detailed fix task describing exactly what went wrong and what needs to be corrected.
            - listitem [ref=e856]:
              - text: The fix task is automatically created with a
              - strong [ref=e857]: high priority override
              - text: and is queued immediately.
            - listitem [ref=e858]: The fix task runs through its own workflow (usually Quick type) and is linked back to the original task.
          - heading "Result" [level=3] [ref=e859]
          - paragraph [ref=e860]:
            - text: Tasks that pass verification move to
            - strong [ref=e861]: Review
            - text: as normal. Tasks that fail have their fix tasks run first; once the fix is complete and verified, the original task proceeds to Review.
        - generic [ref=e862]:
          - heading "Goal Tasks & DAG Decomposition" [level=2] [ref=e863]
          - paragraph [ref=e864]:
            - text: A
            - strong [ref=e865]: Goal
            - text: task represents a high-level objective. Instead of running code directly, a Goal task triggers the Architect skill, which breaks it into 3–8 concrete child tasks with a dependency graph (DAG).
          - heading "End-to-End Flow" [level=3] [ref=e866]
          - list [ref=e867]:
            - listitem [ref=e868]: Create a Goal task with a high-level objective (e.g., "Add user authentication").
            - listitem [ref=e869]:
              - text: Queue it — it enters the
              - strong [ref=e870]: Architecting
              - text: stage.
            - listitem [ref=e871]:
              - text: The Architect analyzes the codebase and decomposes the goal into child tasks, each with a
              - code [ref=e872]: depends_on
              - text: list.
            - listitem [ref=e873]:
              - text: Child tasks appear on the board linked via
              - code [ref=e874]: parentGoalId
              - text: . Tasks with no dependencies are queued immediately; dependent tasks are
              - strong [ref=e875]: Blocked
              - text: .
            - listitem [ref=e876]: As child tasks complete, their dependents are automatically unblocked and queued.
            - listitem [ref=e877]:
              - text: The Goal task itself moves to
              - strong [ref=e878]: Done
              - text: once created — its progress is tracked through its children.
          - heading "DAG Relationships" [level=3] [ref=e879]
          - list [ref=e880]:
            - listitem [ref=e881]:
              - text: Each child task may declare
              - code [ref=e882]: "depends_on: [\"sibling-task-id\", ...]"
              - text: in the architect output.
            - listitem [ref=e883]: Blocked tasks display a dependency indicator on their card showing which tasks they are waiting for.
            - listitem [ref=e884]: Automatic unblocking runs whenever a task reaches review or done — Formic checks all blocked tasks and unblocks those whose dependencies have all completed execution.
          - heading "Viewing Child Tasks" [level=3] [ref=e885]
