            - listitem [ref=e802]: Click it again, or press Escape, to close the panel.
            - listitem [ref=e803]: The panel can be expanded to a larger view for longer conversations.
          - heading "What the Assistant Can Help With" [level=3] [ref=e804]
          - list [ref=e805]:
            - listitem [ref=e806]:
