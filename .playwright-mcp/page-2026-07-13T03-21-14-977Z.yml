          - generic [ref=e2060]: "## Goal Close the 7 gaps found in the review of task t-112 (commit e5cd428, 'security enhancement'). The security code itself (timingSafeEqualStrings, Telegram webhook secret) is correct and verified — do NOT rework it. These fixes make the release pipeline actually runnable and the container setup functional under the documented production configuration. ## Fixes (file level) ### 1. .github/workflows/release.yml — docker job: build dist/ before the image build (RELEASE-BLOCKING) The runtime Dockerfile does `COPY dist/ ./dist/` but the docker job goes straight from checkout to docker/build-push-action — there is no dist/ in a CI checkout, so the first tagged release fails. In the `docker` job, after `actions/checkout@v4` and BEFORE the hadolint step, add: - `actions/setup-node@v4` with node-version: 22 and cache: npm - `run: npm ci` - `run: npm run build` Run these unconditionally for both matrix entries (the devcontainer build doesn't need dist/ but the extra ~1 min is harmless and keeps the job linear). ### 2. .github/workflows/release.yml — gitleaks job: remove the nonexistent config reference (RELEASE-BLOCKING) The job passes `config-path: '.gitleaks.toml'` but that file does not exist in the repo, so the gate job fails on every run. Fix: delete the `with:` block entirely so gitleaks-action@v2 uses its default ruleset (the repo history is clean — verified during review). Do NOT create a .gitleaks.toml. Keep `fetch-depth: 0`. Also add `env: GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}` to the gitleaks step (required by gitleaks-action@v2 for PR/commit annotations). ### 3. .github/workflows/release.yml — tarball-audit job: fix the malformed artifact upload (RELEASE-BLOCKING) The `Upload file list artifact` step's `path:` block contains only YAML comments — no actual path — and the audit output is never written to a file. Fix: - Change the audit step to: `run: node scripts/auditNpmPack.mjs | tee npm-pack-files.txt` - Change the upload step to `path: npm-pack-files.txt` (keep `if: always()` and `name: npm-pack-files`). ### 4. .github/workflows/release.yml — pin trivy action and fix the image-ref suffix - Replace `aquasecurity/trivy-action@master` with a pinned release tag (use the latest stable tag at implementation time, e.g. `aquasecurity/trivy-action@0.33.1` — verify current); an unpinned @master ref inside a security pipeline is itself a supply-chain risk. - Fix the scan target: `image-ref: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}${{ matrix.dockerfile.suffix }}` double-applies the suffix because docker/metadata-action's `version` output ALREADY includes the flavor suffix (producing e.g. `0.8.0-devcontainer-devcontainer`). Change to `image-ref: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}` and verify against the metadata-action docs. - Also fix the header comment claiming 'Multi-arch Docker buildx' — either add `platforms: linux/amd64,linux/arm64` to the build-push step (preferred; requires `docker/setup-qemu-action@v3` before buildx setup) or correct the comment to single-arch. Pick one and make comment and reality match. ### 5. Auth-exempt health endpoint — fixes the permanently-unhealthy container (RUNTIME DEFECT) Under the documented production config (HOST=0.0.0.0 + FORMIC_AUTH_TOKEN, enforced by docker-compose.yml), the global onRequest auth hook 401s the header-less Docker HEALTHCHECK request to /api/board, so the container is permanently unhealthy. - **src/server/routes/board.ts** (or a more fitting existing route file): add `GET /api/health` returning `{ status: 'ok' }` with reply 200. It must expose NO sensitive data — no version, no workspace path, no task data. Route stays a thin handler (no service logic needed). - **src/server/index.ts** (~line 143-150, the auth hook): exempt exactly this path before the token check: `if (request.url === '/api/health') { return; }` with a comment explaining the healthcheck exemption and that the endpoint is deliberately data-free. Exempt ONLY /api/health — nothing else, no prefix matching. - **Dockerfile** (HEALTHCHECK line): point the check at `http://localhost:8000/api/health` instead of /api/board. - **test/test_security.py**: in the existing auth-token scenario (server on port 8410 with FORMIC_AUTH_TOKEN), add two assertions: GET /api/health returns 200 WITHOUT an Authorization header, and GET /api/board still returns 401 without one. ### 6. docker-compose.yml — writable volume for the global config (RUNTIME DEFECT) `read_only: true` makes /home/node read-only, but configStore writes the global config to ~/.formic (src/server/services/configStore.ts — ensureGlobalFormicDir + saveConfig). Startup survives via fallback, but every settings save (agent provider switch, stepModels, workspaces) fails with EROFS. - Add a named volume: under the service `volumes:` list add `formic-config:/home/node/.formic`, and declare at the top level: ``` volumes: formic-config: ``` - Add a comment explaining: the root FS is read-only; this volume is the only writable path besides the workspace mount and /tmp, and it persists UI settings (~/.formic/config.json) across container restarts. ### 7. test/run_tests.py — register the security suite Add `(\"Security Tests\", \"test_security.py\")` to the `test_suites` baseline list (~line 49-59). Note this suite spawns its own servers on ports 8410/8411 via tsx and does not use the shared dev server — placement in the list order doesn't matter, but append it last so the shared-server suites run first. ### 8. Dockerfile — declare the FORMIC_VERSION build arg The runtime Dockerfile's LABEL uses `${FORMIC_VERSION:-0.8.0}` but never declares `ARG FORMIC_VERSION`, so the expansion relies on undefined-variable fallback. Add `ARG FORMIC_VERSION=0.8.0` next to the other ARGs (CLAUDE_CODE_VERSION / OPENCODE_AI_VERSION) and simplify the label to `org.opencontainers.image.version=\"${FORMIC_VERSION}\"` (matching Dockerfile.devcontainer, which already does this correctly). ## Out of scope - No changes to src/server/utils/security.ts, the Telegram secret logic in telegramAdapter.ts, or the webhook handler validation — these were reviewed and verified correct. - No changes under skills/. No new npm dependencies. ## Constraints TypeScript strict; pure ESM with .js import extensions; `import type` for type-only imports; routes delegate to services (the health route has no logic, which is fine); console.warn/error with [ServiceName] prefixes; async fs only. ## Acceptance criteria 1. `npx tsc --noEmit` passes. 2. `python3 test/test_security.py` passes standalone, including the two new /api/health assertions (200 unauthenticated, /api/board still 401). 3. `python test/run_tests.py` now executes the Security Tests suite (visible in its output). 4. `npm ci && npm run build && docker build .` succeeds from a CLEAN checkout (simulate CI: `git clean -xdf` in a scratch clone or verify dist/ is produced by the workflow steps, not assumed) — this proves gap 1 is closed. `docker run --rm <img> whoami` prints `node`. 5. With `-e HOST=0.0.0.0 -e FORMIC_AUTH_TOKEN=x`, the container reaches a `healthy` state (docker inspect --format='{{.State.Health.Status}}'). 6. release.yml passes actionlint (or `gh api` workflow lint) with: no reference to .gitleaks.toml, a real artifact path, pinned trivy action, no doubled suffix in image-ref, and build steps present in the docker job before build-push. 7. `docker compose config` validates; the compose file declares the formic-config named volume mounted at /home/node/.formic with read_only still true."
