          - generic [ref=e1681]: "Implements Phase 4 of docs/TOKEN_USAGE_PROXY_PLAN.md — persists UsageEvents to an append-only NDJSON file and exposes aggregation endpoints for the UI. DEPENDS ON Phase 2 (UsageEvent type) and Phase 3 (the proxy emits events via onUsageEvent). Wires the store to the proxy's onUsageEvent hook at startup. ## Constraints - ESM .js imports, node: builtins (node:fs/promises, node:readline, node:fs createReadStream), TS strict no `any`, `import type`, no new deps, log prefix `[UsageStore]`, no console.log, no empty catch, async fs only. Routes delegate to services (no logic in route handlers). ## New file: src/server/services/usageStore.ts - Path helper: events file at path.join(getFormicDir(), 'usage', 'events.ndjson'); import getFormicDir from '../utils/paths.js'. mkdir({recursive:true}) the usage dir on first append. - Append: `export async function appendEvent(e: UsageEvent): Promise<void>` — serialize behind a module-level promise chain `let appendLock: Promise<void> = Promise.resolve();` (same pattern as persistLock in leaseManager.ts ~line 30) so concurrent appends never interleave. Write `JSON.stringify(e) + '\\n'` via appendFile. This module is APPEND-ONLY: expose no update/delete API at all. - Read: `export async function readEvents(filter?: { from?: string; to?: string; taskId?: string }): Promise<UsageEvent[]>` — stream the file line-by-line via node:readline over createReadStream; JSON.parse each non-empty line inside try/catch, skipping malformed lines (a crash-truncated final line is EXPECTED — warn AT MOST once per read, not per line). Apply the filter (timestamp >= from, <= to, taskId ===) while streaming. If the file does not exist, return [] (ENOENT is normal). - Aggregation (pure functions over an events array; computed, never stored): - `export function summarize(events, groupBy: 'model'|'agent'|'task', pricing): Record<string, GroupSummary>` where GroupSummary = { inputTokens, outputTokens, cacheCreationTokens, cacheReadTokens, requests, avgLatencyMs, estCostUsd: number|null, costBasis: 'ESTIMATED' }. Group key = event.model / event.agentId / event.taskId. Sum token columns SEPARATELY (cache tokens are their own columns; NEVER add them into inputTokens). avgLatencyMs = mean of latencyMs. Cost: see pricing below. - `export function timeseries(events, bucketMs: number, groupBy): Array<{ bucketStart: string; groups: Record<string, GroupSummary> }>` — floor each event.timestamp to bucketMs boundaries, group within each bucket. - Pricing: `export async function loadPricing(): Promise<Record<string, ModelPricing>>` resolving in order: .formic/usage/pricing.json (workspace override, via getFormicDir) then the bundled templates/pricing.json (via getBundledTemplatesPath() from paths.js — confirm that helper exists; if not use the package-root templates path). ModelPricing = { inputPerMTok, outputPerMTok, cacheWritePerMTok, cacheReadPerMTok }. Cost formula per group: (inputTokens*inputPerMTok + outputTokens*outputPerMTok + cacheCreationTokens*cacheWritePerMTok + cacheReadTokens*cacheReadPerMTok) / 1_000_000. If the model is NOT in pricing → estCostUsd = null (NEVER guess). For a group spanning multiple models (agent/task groups), sum per-event cost using each event's own model; if ANY event's model is unpriced, the group cost is still summed from the priced ones but include a flag or simply treat unpriced contributions as 0 while keeping estCostUsd non-null — pick one policy and document it in a comment (recommended: sum priced contributions, and set estCostUsd=null only when the group has zero priced events). - Add the UsageEvent import from '../../types/index.js' and export the GroupSummary / ModelPricing types (add them to src/types/index.ts if shared with the routes/UI). ## New file: templates/pricing.json Seed real per-million-token prices for the Claude models Formic offers (claude-opus-4-8, claude-sonnet-5, claude-fable-5, claude-haiku-4-5-20251001). Use the claude-api skill / current public pricing to fill accurate inputPerMTok / outputPerMTok / cacheWritePerMTok (usually input*1.25) / cacheReadPerMTok (usually input*0.1). Structure: { \"claude-opus-4-8\": { \"inputPerMTok\": N, \"outputPerMTok\": N, \"cacheWritePerMTok\": N, \"cacheReadPerMTok\": N }, ... }. This file ships via the existing package.json `files` allowlist entry `templates/` — confirm it's covered (it is) and DO NOT edit the files array. ## Wire the store to the proxy — modify src/server/index.ts After startTokenProxy(...) succeeds, register the store as the usage sink: `onUsageEvent((event) => { void appendEvent(event).catch(err => console.warn('[UsageStore] append failed:', err instanceof Error ? err.message : 'Unknown error')); });`. (If Phase 3 defined onUsageEvent's callback to receive raw chunks+meta rather than a finished UsageEvent, reconcile: the finished UsageEvent should be produced by the parser's emit callback inside tokenProxy.ts and forwarded through onUsageEvent. Ensure onUsageEvent delivers a complete UsageEvent to this subscriber.) ## Modify: src/server/routes/usage.ts — append 3 routes to the existing usageRoutes plugin (do NOT touch the existing GET /api/usage handler, which is the plan-usage meter — different feature): - GET /api/usage/summary?groupBy=model|agent|task&from=&to= — default groupBy='model', full history. 400 if groupBy not in the allowed set. Calls readEvents(filter) + loadPricing() + summarize(). - GET /api/usage/timeseries?bucket=1m|5m|1h&groupBy=model|agent|task&from=&to= — map bucket string to ms (60000/300000/3600000); 400 on invalid bucket/groupBy. Calls readEvents + timeseries. - GET /api/usage/task/:taskId — readEvents({taskId}) then summarize(..., 'agent') to give the per-step/per-iteration (per-agentId) breakdown, plus a task-level total. Returns { taskId, total: GroupSummary, byAgent: Record<string,GroupSummary> }. Each handler is a thin wrapper: parse/validate query → call usageStore functions → reply.send. All are automatically behind the existing global auth hook. ## Tests (Phase 4 gate) - New test/unit/usageStore.test.ts (node:test, `npm test`): use a temp workspace via setWorkspacePath (pattern from test/unit/noDiffVerification.test.ts lines ~45-59). Seed events.ndjson directly, assert: summarize math per groupBy; cache tokens counted as separate columns (a targeted assertion that inputTokens excludes cache tokens); unknown-model → estCostUsd null; corrupt trailing line tolerated (append a truncated line, assert readEvents skips it and still returns the good rows); 20 concurrent appendEvent calls produce 20 well-formed lines (no interleaving). Also simulate 'restart': write events, call readEvents fresh, assert all present (Acceptance #5). - New test/test_usage_api.py registered in test/run_tests.py `test_suites` list (append a tuple like (\"Usage API Tests\", \"test_usage_api.py\")): against the running server, drop a known events.ndjson fixture into the server workspace's .formic/usage/, then GET the three endpoints and assert the aggregation math and the 400 error cases (bad groupBy, bad bucket). Restore/cleanup the fixture in teardown. ## Verification / acceptance - `npx tsc --noEmit` clean; `npm test` green (incl. usageStore suite); `python test/run_tests.py` green (incl. new usage API suite) against a locally running server. - Aggregations correct; cache tokens never folded into inputTokens; unknown model cost is null and responses carry costBasis:'ESTIMATED'. - Events persist across a server restart (re-read returns prior events). - Store is strictly append-only (no mutate/delete code path exists)."
