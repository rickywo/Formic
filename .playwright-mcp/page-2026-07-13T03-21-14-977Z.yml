          - generic [ref=e2070]: "## Goal Close the verified findings from the second review of the release-hardening work (t-112/t-113). All items below were confirmed against the current working tree. Do not rework anything not listed. ## A. Release blockers ### 1. .github/workflows/release.yml — scan BEFORE push (currently publishes vulnerable images) The docker job builds with `push: true` (~line 153) and runs Trivy afterwards (~line 159), so a HIGH/CRITICAL finding fails the job only after the image is already on GHCR. Restructure the docker job: - First `docker/build-push-action` call: `push: false`, `load: true`, tag a local scan tag (e.g. `local/formic-scan:${{ matrix.dockerfile.suffix || 'runtime' }}`). Note `load: true` is single-platform only — this is fine (see item 4 in t-113: single-arch; keep the header comment honest). - Run Trivy against that local tag with `exit-code: 1`, severity HIGH,CRITICAL. - Only on scan success, a second `docker/build-push-action` call with `push: true` and the real `steps.meta.outputs.tags` — the buildx layer cache makes this second build a no-op rebuild. Keep `sbom: true, provenance: true` on the push call. ### 2. src/server/index.ts — bearer-exempt the webhook routes (Telegram AND LINE are unusable on 0.0.0.0) The global auth hook (~line 143-155) exempts only /api/health. Telegram and LINE cannot send `Authorization: Bearer`, so on HOST=0.0.0.0 every real webhook delivery gets 401 before reaching the route's own validation — Telegram's constant-time secret check (webhooks.ts) and LINE's HMAC signature check (verifyLineSignature) never run. - In the auth hook, exempt exactly these two paths in addition to /api/health: `POST /api/webhooks/telegram` and `POST /api/webhooks/line` (match on `request.url === '/api/webhooks/telegram' || request.url === '/api/webhooks/line'` — exact match only, no prefix matching, and add a comment stating each route enforces its own credential: Telegram secret-token header, LINE HMAC signature). Do NOT exempt /api/messaging/* or any other webhook-adjacent route. - **test/test_security.py**: extend the existing auth-token scenario (server on port 8410 bound 0.0.0.0 with FORMIC_AUTH_TOKEN AND TELEGRAM_BOT_TOKEN + TELEGRAM_WEBHOOK_SECRET set): assert POST /api/webhooks/telegram WITHOUT a bearer header but WITH the correct X-Telegram-Bot-Api-Secret-Token returns 200; with a wrong secret returns 401; and GET /api/board without bearer still returns 401. This is the non-loopback integration test the review demanded. ### 3. .github/workflows/release.yml + Dockerfile.devcontainer — devcontainer npm release race and stale version The devcontainer installs `@rickywo/formic@${FORMIC_VERSION}` (Dockerfile.devcontainer ~line 57) with ARG default 0.8.0, while the docker job runs in PARALLEL with npm-publish (both need only [gitleaks, tarball-audit]) and never passes the tag version. Fix all three aspects: - Split the matrix: make the devcontainer build a separate job (or matrix-conditional) that adds `needs: [npm-publish]`. - Derive the version from the tag: add a step `VERSION=${GITHUB_REF_NAME#v}` and pass `build-args: FORMIC_VERSION=${VERSION}` to the devcontainer build. - Registry propagation guard: before the devcontainer build, poll `npm view @rickywo/formic@${VERSION} version` in a retry loop (e.g. 10 attempts, 30s apart, fail after) — npm publish returning success does not guarantee immediate availability. ## B. Fix the failing unit suite (39/159 failures — blocks the quality gate) ### 4. test/unit/agentAdapterOpencode.test.ts (all 39 failures are in this one file) The file saves/sets/deletes `process.env.AGENT_TYPE` (lines ~28-35 and throughout) expecting getAgentType() to react, but since the provider-selection change getAgentType() reads `engineConfig.agentType` (src/server/services/agentAdapter.ts ~line 181), which is only derived from env at module init / refreshEngineConfig(). Update the test file: import { engineConfig } from '../../src/server/services/engineConfig.js'; in before/beforeEach save `engineConfig.agentType` and set it directly (e.g. engineConfig.agentType = 'opencode'), restore in after/afterEach. Remove the process.env.AGENT_TYPE manipulation entirely (it is now dead). Do NOT change agentAdapter.ts to re-read env — the settings-first precedence is intentional. ## C. Standards gaps ### 5. Dockerfile (~line 39) and Dockerfile.devcontainer (~line 39) — unpinned apt packages hadolint DL3008 flags unpinned `apt-get install`, which fails the hadolint gate. Debian version pinning is brittle (point releases vanish from mirrors), so use the accepted pattern: add `# hadolint ignore=DL3008` on the RUN line with a one-line comment justifying why (mirror churn; base image digest pin provides reproducibility). Apply to both files. ### 6. Dockerfile (~line 84) — replace the CommonJS healthcheck Swap the `require('http')` one-liner for Node 22 native fetch: `CMD node -e \"fetch('http://localhost:8000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"`. Behavior identical. ### 7. docker-compose.yml — agent CLIs need writable home paths under read_only Only /home/node/.formic is writable; Claude Code writes ~/.claude and ~/.claude.json, OpenCode writes ~/.config/opencode, ~/.local/share, ~/.cache — all EROFS today, so agents fail at runtime in the hardened container. Replace the `formic-config:/home/node/.formic` volume with a single `formic-home:/home/node` named volume (rename in the top-level volumes: block too, update the explanatory comment: home is the only writable path besides the workspace and /tmp; it persists UI settings AND agent CLI state). Acceptance: `docker compose run` (or exec) can `mkdir -p ~/.claude ~/.config/opencode && touch ~/.claude/probe ~/.config/opencode/probe` successfully while `touch /probe` fails. ### 8. src/server/services/telegramAdapter.ts (~line 563) — getTelegramWebhookSecret hardening (three fixes in one function) (a) Race: concurrent first calls each load-generate-save, potentially registering one secret with Telegram while persisting another. Memoize with a module-level `let webhookSecretPromise: Promise<string> | null = null;` — assign the async body's promise on first call, reset to null on rejection, return the cached promise otherwise. (b) Format validation: Telegram's secret_token must match ^[A-Za-z0-9_-]{1,256}$. Validate a TELEGRAM_WEBHOOK_SECRET env value against this regex; if invalid, `console.error('[TelegramAdapter] TELEGRAM_WEBHOOK_SECRET has invalid format (allowed: A-Za-z0-9_-, 1-256 chars) — ignoring env value')` and fall through to the persisted/generated secret. Document the format in .env.example next to TELEGRAM_WEBHOOK_SECRET. (c) The generated 64-hex-char secret already conforms — no change needed there. ### 9. src/server/services/messagingStore.ts (~line 79) — restrictive permissions on messaging.json saveMessagingStore uses writeFile defaults (0644) while the file now holds the webhook secret. Pass `{ mode: 0o600 }` to writeFile, and after writing call chmod 0o600 (fs/promises) so pre-existing files are tightened too. Keep it async. ### 10. .github/workflows/release.yml (~line 164) — lowercase the Trivy/GHCR image reference `ghcr.io/${{ github.repository }}` yields `ghcr.io/rickywo/Formic` (invalid: uppercase). metadata-action lowercases its own outputs, but the raw interpolation does not. With the item-1 restructure, scan the local tag instead; for any remaining raw references, derive once via a step: `echo \"image=ghcr.io/${GITHUB_REPOSITORY,,}\" >> \"$GITHUB_OUTPUT\"` and use that output. ### 11. .github/workflows/release.yml (~line 176) — truthful release summary release-summary uses `if: always()` and unconditionally prints success. Keep `if: always()` but render actual results from the needs context, e.g. lines like `- npm publish: ${{ needs.npm-publish.result }}` and `- docker: ${{ needs.docker.result }}`, and only print the success banner when both results are 'success'. ## Out of scope - src/server/utils/security.ts, the webhook handler validation logic, the audit script, and all t-113 fixes already verified working (dist build step, gitleaks config removal, artifact upload, trivy pin, suffix fix, ARG FORMIC_VERSION, /api/health endpoint itself, run_tests.py registration). - No changes under skills/, no new npm dependencies. ## Constraints TypeScript strict; pure ESM with .js import extensions; `import type` for type-only imports; console.warn/error with [ServiceName] prefixes; async fs only; routes delegate to services. ## Acceptance criteria 1. `npx tsc --noEmit` passes and `npm test` passes 159/159 (agentAdapterOpencode.test.ts fixed, no other suites regressed). 2. `python3 test/test_security.py` passes including the new non-loopback webhook assertions (Telegram 200 with secret + no bearer; 401 with wrong secret; /api/board still 401). 3. In release.yml: the push to GHCR happens only after a passing Trivy scan of the locally built image; the devcontainer build depends on npm-publish, polls the registry for the tag version, and receives FORMIC_VERSION from the git tag; no raw `ghcr.io/${{ github.repository }}` interpolation remains; the summary reflects actual job results. Workflow passes actionlint. 4. hadolint passes on both Dockerfiles (DL3008 handled via justified inline ignore). 5. `docker compose config` validates with the formic-home volume; inside the running hardened container, writes to ~/.claude and ~/.config/opencode succeed while writes to / fail. 6. messaging.json is created with 0600 permissions (verify with a test or manual stat); concurrent getTelegramWebhookSecret() calls return the same secret (add a unit test in test/unit/ that fires 5 concurrent calls against a temp store and asserts one persisted value)."
