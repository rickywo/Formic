          - generic [ref=e1722]: "Fix missing per-task token accounting for OpenCode executions. OpenCode already emits token data in JSONL `step_finish` events under `part.tokens`, but Formic currently ignores this output and relies on reading `~/.local/share/opencode/opencode.db` through `node:sqlite`. This fails on runtimes where `node:sqlite` is unavailable, including many supported Node 20 installations, and is vulnerable to OpenCode database schema changes. Implement a shared OpenCode JSONL usage parser and integrate it into both execution paths in `src/server/services/runner.ts` and `src/server/services/workflow.ts`. While processing stdout, detect `step_finish` events, normalize input, output, reasoning, and cache read/write token fields into Formic's `UsageEvent` representation, and persist them through the existing usage store. Attribute each event to the task ID and active workflow step already known by the spawning code. Generate stable event IDs from OpenCode session/message/part identifiers and prevent duplicate accounting across stream chunks, retries, and any SQLite fallback scan. Buffer partial lines because stdout chunk boundaries do not guarantee complete JSONL records. Retain `src/server/services/opencodeUsage.ts` only as a compatible fallback if useful, but direct stdout collection must work without `node:sqlite`. Ensure usage update events are emitted so API responses and the UI refresh after persistence. Consider whether OpenCode's `tokens.total` is cumulative or informational; persist normalized component values without double-counting cache tokens or counting `total` as an additional category. Add focused unit tests covering complete and chunked JSONL lines, malformed/non-usage events, multiple `step_finish` records, cache fields, stable deduplication, task/step attribution, and operation when SQLite is unavailable. Include a regression fixture matching `.formic/logs/t-156/execute.log`, where token-bearing `step_finish` events were logged but no `.formic/usage/events.ndjson` entry was created. Acceptance criteria: - OpenCode task executions persist per-task usage from stdout without requiring `node:sqlite` or the OpenCode database. - Both quick-task and standard workflow execution paths are covered. - Each token-bearing event is counted exactly once, including when stdout arrives in partial chunks or the SQLite fallback sees the same session. - `/api/usage/task/:id`, `/api/usage/tasks`, and usage summaries include the captured events. - Usage-update notifications are emitted for affected task IDs. - Claude and Copilot behavior remains unchanged. - TypeScript builds successfully and relevant unit tests pass."
