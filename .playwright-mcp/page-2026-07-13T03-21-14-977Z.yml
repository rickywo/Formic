ncomplete frame in the buffer). For each frame, read the `data:` line(s), JSON.parse the data payload. On event with type === 'message_start': read parsed.message.model → model; parsed.message.usage.input_tokens → inputTokens; .cache_creation_input_tokens → cacheCreationTokens; .cache_read_input_tokens → cacheReadTokens. On type === 'message_delta': read parsed.usage.output_tokens (cumulative) → outputTokens; parsed.delta.stop_reason → stopReason. Ignore other event types. Wrap each JSON.parse in try/catch (a partial/garbage frame must not throw out of feed — log [UsageParser] warn at most once). - JSON mode (meta.streaming false): append raw bytes to a Buffer accumulator; enforce a 10 MB cap — if exceeded, set an `overflow=true` flag, drop the buffer, and stop accumulating (end() will emit nothing and warn). - `end(): void` — idempotent (guard on finished). JSON mode: if !overflow, JSON.parse the accumulated body; read usage.input_tokens/output_tokens/cache_creation_input_tokens/cache_read_input_tokens and top-level model. Compute latencyMs = Date.now() - meta.startedAt. Build a UsageEvent with id=crypto.randomUUID(), timestamp=new Date().toISOString(), partial=false, model = parsed/model ?? meta.requestModel ?? 'unknown', and call meta.emit(event). SSE mode: same, using the accumulated streaming numbers, partial=false. - `abort(): void` — idempotent. Emit whatever was captured so far with partial=true (input tokens from message_start if seen, outputTokens = last delta seen or 0), then set finished=true. Used when the client or upstream socket closes early. - crypto via `import { randomUUID } from 'node:crypto'`. ## Test fixtures (capture real shapes; hand-author if no live capture available, matching the Anthropic Messages SSE spec): - test/fixtures/anthropic-sse-basic.txt — a full streaming response: message_start (with usage.input_tokens, cache_creation_input_tokens:0, cache_read_input_tokens:0, message.model), content_block_start/delta/stop, message_delta (usag