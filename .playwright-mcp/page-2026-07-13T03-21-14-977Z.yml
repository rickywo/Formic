          - generic [ref=e2040]: "## Goal The AI provider (claude / copilot / opencode) is currently fixed at server start via the AGENT_TYPE env var, read by getAgentType() in src/server/services/agentAdapter.ts (~line 185). Make it a runtime-selectable setting persisted in ~/.formic/config.json, switchable from the main Kanban page header via an availability-aware provider switcher, without server restart. AGENT_TYPE remains a fallback/seed for headless deployments. ## Design decisions (settled — implement as specified) 1. Precedence: settings.agentType > AGENT_TYPE env > 'claude'. Runtime switch takes effect on the NEXT agent spawn; in-flight processes finish under the provider they started with. No new plumbing needed for propagation: every top-level operation already calls refreshEngineConfig() first (queueProcessor.ts:50, runner.ts:102, workflow.ts, watchdog.ts:117, assistantManager.ts:594, messagingAI.ts:368). 2. Header UI is a pill + dropdown that mirrors the existing workspace switcher pattern (NOT a native <select>), showing per-provider availability. 3. Providers whose CLI is not installed are shown grayed out with an install hint and are NOT selectable. 4. Switching while tasks are active/queued prompts an in-app confirmation modal; it never hard-blocks and never switches silently. 5. Switching resets the assistant conversation server-side AND surfaces a visible notice client-side. ## File-level changes ### A. Core plumbing **1. src/types/index.ts (~line 380-400)** — Add `agentType?: AgentType;` to ConfigSettings with doc comment: 'Selected agent CLI provider. Missing = fall back to AGENT_TYPE env var, then claude.' AgentType union already exists at line 5. Also add an `AgentAvailability` interface: `{ type: AgentType; displayName: string; installed: boolean; version?: string; hint?: string }`. **2. src/server/services/engineConfig.ts** — Add `agentType: AgentType` to EngineConfig interface and defaults (initialize from a normalized process.env.AGENT_TYPE so pre-first-refresh behavior matches today). In refreshEngineConfig(): `engineConfig.agentType = normalizeAgentType(s.agentType) ?? normalizeAgentType(process.env.AGENT_TYPE) ?? 'claude'`. Export `normalizeAgentType(value: unknown): AgentType | null` (returns null for anything not exactly 'claude'|'copilot'|'opencode' after lowercasing). **3. src/server/services/agentAdapter.ts** — Rewrite getAgentType() (~line 185) to a thin synchronous read of engineConfig.agentType (mirroring getModelForStep() at ~line 406 which already reads engineConfig.stepModels; engineConfig is already imported). Remove the env parsing from this function — it now lives only in engineConfig. **4. NEW: src/server/services/agentAvailability.ts** — Extract CLI detection currently duplicated in src/server/utils/banner.ts runDependencyChecks() (lines 84-122: claude --version, 'gh copilot --version' ?? 'copilot --version', opencode --version). Export `async function detectAgents(): Promise<AgentAvailability[]>` using promisified execFile from node:child_process (NEVER execSync — this runs in a route handler and must not block the event loop). Include displayName (reuse the names from getAgentDisplayName) and per-provider install hints matching banner.ts (e.g. 'Install: npm install -g @anthropic-ai/claude-code'). Cache results with a ~60s TTL module-level cache and accept a `force` param to bypass. Refactor banner.ts to consume this service for its CLI checks (banner may keep using its sync path at startup OR await the async service — prefer awaiting since printStartupBanner is already async; keep output identical). ### B. API **5. src/server/routes/config.ts** - Add 'agentType' to BOTH validKeys arrays (GET ~line 88, PUT ~line 119). - PUT validation for key === 'agentType': value must be a string in the existing SUPPORTED_AGENT_TYPES set (line 15), else 400 with descriptive error. - After setSetting() succeeds for agentType: `await refreshEngineConfig()` (so GET /api/models and assistant spawns reflect it immediately) and call resetConversation() from assistantManager (see change 6). - GET /api/models (~line 29): `await refreshEngineConfig()` before responding. - NEW endpoint `GET /api/agents`: returns `{ current: getAgentType(), agents: await detectAgents() }`. Support `?refresh=1` to bypass the TTL cache (used when the dropdown opens). Route delegates to the service only — no detection logic in the route file. **6. src/server/services/assistantManager.ts** — Export `resetConversation(): void` that sets module-level `isFirstMessage = true` (see line 41; restartAssistant() at ~line 908 already does this). Log `console.warn('[AssistantManager] Agent type changed — conversation reset')`. **7. src/server/index.ts (~line 195-204)** — `await refreshEngineConfig()` right after fastify.listen, before the getAgentType()/getAgentDisplayName() calls at line 201, so the startup banner reflects the persisted setting, not just the env var. **8. src/server/services/runner.ts** — Capture `const agentType = getAgentType()` once at spawn time and pass it to parseAgentOutput / usesJsonOutput (outputParser.ts lines ~365/~387 already accept an optional agentType param defaulting to getAgentType()). Prevents a mid-flight switch from parsing one CLI's output with another CLI's parser. Apply the same spawn-time capture in assistantManager.ts processMessage() (~line 597) and messagingAI.ts (~line 593) wherever output is parsed after an await. ### C. Client (src/client/index.html — single file, ~11.5k lines) **9. Header agent switcher** — In `.desktop-header-right` (~line 7030), before the usage meter, add an agent pill + dropdown cloned from the workspace switcher pattern: trigger button (markup pattern at line 6990, `workspace-trigger`), dropdown panel (line 6997, `workspace-dropdown`), open/close JS (toggleWorkspaceDropdown at ~line 8089, including its outside-click close behavior). Pill shows a small icon + current provider display name. Dropdown lists all three providers; each row shows: display name, and either '✓ v<version>' (installed) or the install hint grayed out. Installed rows are clickable; uninstalled rows are visually disabled (aria-disabled, no pointer action). On dropdown open, fetch GET /api/agents?refresh=1 and render rows from the response. Add CSS mirroring .workspace-dropdown styles (~lines 1490-1590) plus [data-theme=\"light\"] overrides (pattern at ~line 764). In the mobile media query (~line 4928), hide the header pill — mobile users switch via the Settings panel selector (see change 11). **10. Switch flow JS** — selectAgentType(newType): (a) If any board task is active or queued (reuse isTaskActive() at line 7916 plus status === 'queued', same filter as line 10560), show an in-app confirmation modal (reuse the app's existing modal pattern — do NOT use native confirm()): 'N task(s) are running or queued. Steps already in progress will finish with <current display name>; subsequent steps will use <new display name>. Continue?' Cancel aborts with no change. (b) PUT /api/config/settings/agentType { value }. On non-2xx: error toast (showToast at line 8049), no UI change. (c) On success: update pill label, showToast('Switched to <display name>'), re-fetch /api/models and re-render the Settings Agent Models section via the existing loaders (fetchModelCatalog/initializeSettingsPanel machinery ~lines 9606-9666), refresh the usage meter (usage.ts branches on agent type), and if the AI Assistant panel is open, append a system-style notice message: 'Provider switched to <display name> — conversation restarted.' On page init, fetch GET /api/agents to set the initial pill state. **11. Settings panel mirror** — At the top of the Agent Models section (~line 7732), add the same provider selector (a simple select is fine here) bound to the same selectAgentType handler, so provider + models are configurable in one place and mobile has a switching path. Update the caption at ~line 9663 that currently reads 'AGENT_TYPE=${catalog.agentType}' — reword to reference the switcher, e.g. 'Models apply to the <display name> agent. Each provider keeps its own model set.' Update the in-app Help ▸ Settings guide copy (~line 7600) to document the provider switcher. ### D. CLI + docs **12. src/cli/index.ts (~line 96)** — Update AGENT_TYPE help text: initial default/fallback only; the UI selection takes precedence once set. **13. README.md and .env.example** — Update the AGENT_TYPE docs from commit a2af091: new precedence (UI setting > AGENT_TYPE > claude) and the header switcher. ### E. Tests **14. Python API tests (test/, unittest + requests, `python test/run_tests.py` against a running server)** — GET /api/config/settings/agentType returns the key; PUT 'copilot' succeeds and GET /api/models then reports agentType 'copilot' with the copilot catalog; PUT invalid value (e.g. 'gpt-cli') returns 400; GET /api/agents returns current + a 3-entry agents array each with type/displayName/installed fields. Restore the original value in teardown. **15. Playwright E2E (e2e/, follow e2e/model-selection.spec.ts)** — new e2e/agent-selection.spec.ts: header pill shows current provider; opening the dropdown lists three providers with availability states; selecting an installed provider updates the pill, persists across page reload, and the Settings Agent Models section re-renders with that provider's catalog. Restore the original provider at test end. ## Constraints - TypeScript strict; pure ESM with .js import extensions; `import type` for type-only imports; no new dependencies; async fs/child_process only (no execSync outside startup-only paths); console.warn/error with [ServiceName] prefixes; routes delegate to services; no changes to files under skills/. - No changes needed to opencode profile materialization — copyOpenCodeExecutorProfile/copyOpenCodeReadOnlyProfile already run unconditionally at board load (store.ts:247-257), so runtime switching to opencode is already safe. ## Acceptance criteria 1. No env var + no setting → behaves as claude (unchanged default). AGENT_TYPE=opencode + no setting → opencode (backward compatible). Persisted setting overrides env and survives server restart. 2. Header pill reflects the active provider; dropdown shows installed providers with versions and uninstalled ones grayed out with install hints; uninstalled providers cannot be selected. 3. Switching with active/queued tasks shows the confirmation modal; cancel leaves everything unchanged; confirm switches. Switching with an idle board needs no confirmation. 4. After a switch: GET /api/models immediately returns the new catalog; the Settings Agent Models section re-renders; the next queued task executes with the new agent CLI without restart; the assistant conversation is reset server-side and a notice appears in the assistant panel if open. 5. PUT /api/config/settings/agentType rejects invalid values with 400. GET /api/agents never blocks the event loop (async exec, TTL cache). 6. `npx tsc --noEmit` passes; `python test/run_tests.py` passes against a running server; `npx playwright test` passes including the new spec."
