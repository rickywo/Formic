            - generic [ref=e1790]: medium
          - generic [ref=e1791]: "The thinking/status indicator (`#assistant-thinking-indicator`) in the AI Assistant chat panel is never visibly seen by users, even though it is being triggered correctly on the server side. **Root cause 1 — Timing/paint race (primary):** For Claude Code, the server broadcasts `stream_status` (from the CLI's `system/init` event) and then immediately broadcasts `stream_delta` (from the first `assistant` text event) within the same event loop tick, since both lines often arrive in the same stdout chunk. The browser receives both WebSocket messages before it has had a chance to paint a frame. `showThinkingBubble()` and `removeThinkingBubble()` both run before any repaint, so the indicator is never rendered visibly. **Fix:** Enforce a minimum visible duration (~500ms) for the thinking indicator. When `removeThinkingBubble()` is called, check `Date.now() - thinkingShownAt`. If the indicator has been shown for less than the minimum, use `setTimeout` to delay the actual removal. **Root cause 2 — Stale timeout bug (secondary):** `removeThinkingBubble()` sets a 200ms safety-fallback `setTimeout` to clear `.visible`. If a subsequent `stream_status` event arrives during that window (e.g., a second tool call), `showThinkingBubble()` re-shows the indicator — but the stale timeout then fires and hides it incorrectly. **Fix:** Track a removal timeout ID and cancel it in `showThinkingBubble()` if it's still pending. **Files to modify:** - `src/client/index.html` — update `showThinkingBubble()`, `removeThinkingBubble()`, and related JS state variables (around line 9160–9170 for state vars, 9803–9828 for the functions, 9659–9663 for the `stream_status` handler) **Acceptance criteria:** - Sending a message to the AI Assistant always shows the thinking indicator for a clearly perceptible duration (≥500ms) - If multiple tool-status updates arrive in sequence, the indicator stays visible continuously without flickering or disappearing prematurely - The indicator correctly fades out when the assistant's text response begins streaming - No regression to existing animation or removal logic"
