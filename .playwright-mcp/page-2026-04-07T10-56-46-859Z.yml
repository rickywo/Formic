        - generic [ref=e207]:
          - heading "AI Assistant" [level=2] [ref=e208]
          - paragraph [ref=e209]: The AI Assistant is a chat panel in the bottom-right corner of the board. It is context-aware — it knows your current codebase and board state — and can help with brainstorming, task creation, and answering questions.
          - heading "Opening and Closing" [level=3] [ref=e210]
          - list [ref=e211]:
            - listitem [ref=e212]: Click the floating chat icon (💬) in the bottom-right to open the assistant panel.
            - listitem [ref=e213]: Click it again, or press Escape, to close the panel.
            - listitem [ref=e214]: The panel can be expanded to a larger view for longer conversations.
          - heading "What the Assistant Can Help With" [level=3] [ref=e215]
          - list [ref=e216]:
            - listitem [ref=e217]:
              - strong [ref=e218]: "Brainstorm features:"
              - text: Describe a problem; the assistant will suggest approaches and trade-offs.
            - listitem [ref=e219]:
              - strong [ref=e220]: "Create tasks:"
              - text: Ask it to create a task — it will output a structured
              - code [ref=e221]: task-create
              - text: block that the server automatically processes into a new task.
            - listitem [ref=e222]:
              - strong [ref=e223]: "Explore the codebase:"
              - text: Ask questions about architecture, find files, understand patterns.
            - listitem [ref=e224]:
              - strong [ref=e225]: "Refine requirements:"
              - text: Describe a rough idea and let the assistant turn it into a detailed task description.
          - heading "Creating Tasks via Chat" [level=3] [ref=e226]
          - paragraph [ref=e227]:
            - text: The assistant creates tasks by outputting a
            - code [ref=e228]: task-create
            - text: "code block in the chat:"
          - generic [ref=e229]: "```task-create { \"title\": \"Add login page\", \"context\": \"...\", \"priority\": \"medium\", \"type\": \"standard\" } ```"
          - paragraph [ref=e230]:
            - text: The Formic server detects this block and automatically calls
            - code [ref=e231]: POST /api/tasks
            - text: to create the task on the board.
        - generic [ref=e232]:
          - heading "Lease-Based Concurrency" [level=2] [ref=e233]
          - paragraph [ref=e234]:
            - text: Formic can run multiple tasks in parallel. To prevent conflicting writes, it uses a
            - strong [ref=e235]: file lease system
            - text: managed by
            - code [ref=e236]: leaseManager.ts
            - text: .
          - heading "File Declaration" [level=3] [ref=e237]
          - paragraph [ref=e238]:
            - text: During the
            - strong [ref=e239]: Declaring
            - text: "stage, a task explicitly declares which files it will touch:"
          - list [ref=e240]:
            - listitem [ref=e241]:
              - strong [ref=e242]: Exclusive leases
              - text: — files the task will write to. Only one task can hold an exclusive lease on a file at a time.
            - listitem [ref=e243]:
              - strong [ref=e244]: Shared leases
              - text: — files the task will only read. Multiple tasks can hold shared leases on the same file simultaneously.
          - heading "Task Yielding" [level=3] [ref=e245]
          - paragraph [ref=e246]:
            - text: When a task requests an exclusive lease on a file that is already held exclusively by another running task, it
            - strong [ref=e247]: yields
            - text: — it pauses and re-queues itself to wait. Once the conflicting lease is released, the yielded task is picked up again automatically.
          - heading "Optimistic Concurrency for Shared Files" [level=3] [ref=e248]
          - paragraph [ref=e249]:
            - text: "Shared-lease files use optimistic concurrency: conflicts are detected at merge time via"
            - code [ref=e250]: git hash-object
            - text: collision detection. If two tasks read the same file and both modify it, the second to merge will detect the collision and trigger a resolution step.
          - heading "Lease Expiration & Watchdog" [level=3] [ref=e251]
          - paragraph [ref=e252]: "Leases expire after a configurable duration (default: 5 minutes). A background watchdog process periodically cleans up expired leases to prevent deadlocks if a task crashes without releasing its leases."
        - generic [ref=e253]:
          - heading "Self-Healing QA Loop" [level=2] [ref=e254]
          - paragraph [ref=e255]:
            - text: After a task finishes execution, Formic optionally runs a
            - strong [ref=e256]: Verifier
            - text: step that checks the implementation before it reaches Review. If verification fails, a
            - strong [ref=e257]: Critic
            - text: automatically creates a fix task.
          - heading "Verifier Step" [level=3] [ref=e258]
          - list [ref=e259]:
            - listitem [ref=e260]: Runs automatically after the Running stage when self-healing is enabled.
            - listitem [ref=e261]: Checks that the implementation meets the acceptance criteria defined in the task's brief.
            - listitem [ref=e262]:
              - text: The task enters the
              - strong [ref=e263]: Verifying
              - text: stage during this check.
          - heading "Critic & Auto-Fix" [level=3] [ref=e264]
          - list [ref=e265]:
            - listitem [ref=e266]: If verification fails, the Critic skill generates a detailed fix task describing exactly what went wrong and what needs to be corrected.
            - listitem [ref=e267]:
              - text: The fix task is automatically created with a
              - strong [ref=e268]: high priority override
              - text: and is queued immediately.
            - listitem [ref=e269]: The fix task runs through its own workflow (usually Quick type) and is linked back to the original task.
          - heading "Result" [level=3] [ref=e270]
          - paragraph [ref=e271]:
            - text: Tasks that pass verification move to
            - strong [ref=e272]: Review
            - text: as normal. Tasks that fail have their fix tasks run first; once the fix is complete and verified, the original task proceeds to Review.
        - generic [ref=e273]:
          - heading "Goal Tasks & DAG Decomposition" [level=2] [ref=e274]
          - paragraph [ref=e275]:
            - text: A
            - strong [ref=e276]: Goal
            - text: task represents a high-level objective. Instead of running code directly, a Goal task triggers the Architect skill, which breaks it into 3–8 concrete child tasks with a dependency graph (DAG).
          - heading "End-to-End Flow" [level=3] [ref=e277]
          - list [ref=e278]:
            - listitem [ref=e279]: Create a Goal task with a high-level objective (e.g., "Add user authentication").
            - listitem [ref=e280]:
              - text: Queue it — it enters the
              - strong [ref=e281]: Architecting
              - text: stage.
            - listitem [ref=e282]:
              - text: The Architect analyzes the codebase and decomposes the goal into child tasks, each with a
              - code [ref=e283]: depends_on
              - text: list.
            - listitem [ref=e284]:
              - text: Child tasks appear on the board linked via
              - code [ref=e285]: parentGoalId
              - text: . Tasks with no dependencies are queued immediately; dependent tasks are
              - strong [ref=e286]: Blocked
              - text: .
            - listitem [ref=e287]: As child tasks complete, their dependents are automatically unblocked and queued.
            - listitem [ref=e288]:
              - text: The Goal task itself moves to
              - strong [ref=e289]: Done
              - text: once created — its progress is tracked through its children.
          - heading "DAG Relationships" [level=3] [ref=e290]
          - list [ref=e291]:
            - listitem [ref=e292]:
              - text: Each child task may declare
              - code [ref=e293]: "depends_on: [\"sibling-task-id\", ...]"
              - text: in the architect output.
            - listitem [ref=e294]: Blocked tasks display a dependency indicator on their card showing which tasks they are waiting for.
            - listitem [ref=e295]: Automatic unblocking runs whenever a task reaches review or done — Formic checks all blocked tasks and unblocks those whose dependencies have all completed execution.
          - heading "Viewing Child Tasks" [level=3] [ref=e296]
          - paragraph [ref=e297]:
            - text: Child tasks appear as regular task cards on the board. Open any child task to see its
            - code [ref=e298]: parentGoalId
            - text: link, which takes you back to the original Goal task.
