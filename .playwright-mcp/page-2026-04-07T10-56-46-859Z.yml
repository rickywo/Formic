          - paragraph [ref=e118]: Formic supports three task types, each with a different workflow suited to the complexity of the work.
          - generic [ref=e119]:
            - generic [ref=e120]:
              - generic [ref=e121]: Standard
              - paragraph [ref=e122]: "Full workflow: Brief → Plan → Declare → Run. The AI generates a feature spec (README.md), creates an implementation plan (PLAN.md + subtasks.json), declares file leases for concurrency, then executes the implementation."
              - paragraph [ref=e123]:
                - strong [ref=e124]: "Best for:"
                - text: new features, refactors, complex bug fixes — any work that benefits from up-front planning.
            - generic [ref=e125]:
              - generic [ref=e126]: Quick
              - paragraph [ref=e127]: Single-step execution — skips briefing and planning, goes directly from Queued to Running. Faster but with no spec or plan document generated.
              - paragraph [ref=e128]:
                - strong [ref=e129]: "Best for:"
                - text: typo fixes, small one-liner changes, documentation updates, or tasks where the description is already complete.
            - generic [ref=e130]:
              - generic [ref=e131]: Goal
              - paragraph [ref=e132]: High-level objective — the Architect skill decomposes it into 3–8 child tasks with a dependency graph (DAG). Each child task then runs independently through its own standard or quick workflow.
              - paragraph [ref=e133]:
                - strong [ref=e134]: "Best for:"
                - text: large epics, multi-file features, or any goal that is too broad for a single task to implement safely.
