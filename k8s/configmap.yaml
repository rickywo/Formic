apiVersion: v1
kind: ConfigMap
metadata:
  name: formic-config
  namespace: formic
  labels:
    app: formic
data:
  PORT: "8000"
  WORKSPACE_PATH: "/app/workspace"
  # Agent type controls which AI coding agent is used.
  # Set to "claude" (default) for Claude Code or "copilot" for GitHub Copilot.
  AGENT_TYPE: "claude"
