# IMPORTANT: Populate the values below before applying this manifest.
# Never commit real secret values to version control.
#
# Alternative: create the secret imperatively instead of applying this file:
#   kubectl create secret generic formic-secrets \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#     --from-literal=GITHUB_TOKEN=ghp_... \
#     -n formic
apiVersion: v1
kind: Secret
metadata:
  name: formic-secrets
  namespace: formic
  labels:
    app: formic
type: Opaque
stringData:
  # Required when AGENT_TYPE=claude
  ANTHROPIC_API_KEY: ""
  # Required when AGENT_TYPE=copilot
  GITHUB_TOKEN: ""
