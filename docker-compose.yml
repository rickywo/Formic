version: '3.8'

services:
  formic:
    # Pin to the published registry image for production deployments.
    # For local development, uncomment `build: .` and comment out `image:`.
    image: ghcr.io/rickywo/formic:0.8.0
    # build: .
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Mount your project directory as the workspace
      - ${WORKSPACE_PATH:-./_workspace}:/app/workspace
      # The root filesystem is read-only (see below); this named volume is the
      # only writable path besides the workspace mount and /tmp. It persists UI
      # settings (~/.formic/config.json) across container restarts, preventing
      # EROFS failures when saving agent provider selection, stepModels, or
      # workspace configuration.
      - formic-config:/home/node/.formic
    # Read-only root filesystem — the workspace volume and formic-config volume
    # are the only writable paths. A tmpfs on /tmp allows agent CLIs and the
    # Node runtime to create temporary files without granting persistent write
    # access to the image.
    read_only: true
    tmpfs:
      - /tmp:exec,size=256M
    security_opt:
      - no-new-privileges:true
    # Example memory limit — adjust to your workload. Agent CLIs can be
    # memory-hungry, especially during long planning/execution runs.
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4G
    environment:
      # API key is required for Docker deployments
      # OAuth credentials are stored in system keychain and not accessible in Docker
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # The server now defaults to binding 127.0.0.1 only. Since the container's
      # published port must be reachable from the host, HOST is set to 0.0.0.0
      # here — which requires FORMIC_AUTH_TOKEN to be set, or the server refuses
      # to start (unauthenticated 0.0.0.0 binding is an RCE risk: the API can
      # execute arbitrary code in the mounted workspace).
      - HOST=0.0.0.0
      - FORMIC_AUTH_TOKEN=${FORMIC_AUTH_TOKEN:?FORMIC_AUTH_TOKEN must be set for container deployments}
    restart: unless-stopped

volumes:
  formic-config:

# Usage:
# 1. Set your API key: export ANTHROPIC_API_KEY=your-key
# 2. Set a strong auth token (required — the container binds 0.0.0.0 internally
#    so its published port is reachable): export FORMIC_AUTH_TOKEN=your-secret-token
# 3. Set workspace path: export WORKSPACE_PATH=/path/to/your/project
# 4. Run: docker-compose up -d
# 5. Open: http://localhost:8000 and set the `Authorization` header to `Bearer`,
#    followed by a space and your FORMIC_AUTH_TOKEN value, on all API requests
#    (or use the client's token prompt if supported).
#
# Note: OAuth login credentials are stored in your system's keychain
# and cannot be shared with Docker containers. Use an API key instead.
