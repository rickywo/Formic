# ==============================================================================
# Formic Release Pipeline
# ==============================================================================
# Triggered on version tags (v*) only. Gates every publish on:
#   1. Secret scanning (gitleaks over full history)
#   2. npm tarball allowlist audit
#   3. npm publish --provenance --access public
#   4. Dockerfile linting (hadolint) and image scanning (trivy) BEFORE push
#   5. Docker buildx with SBOM + provenance, pushing only after a clean scan:
#      <version> (runtime), <version>-devcontainer, and latest (on semver tags)
#
# The runtime and devcontainer images are built and scanned as separate jobs
# because the devcontainer build depends on npm-publish completion (it installs
# @rickywo/formic from the registry, so the package must be available first).
#
# Required secrets:
#   NPM_TOKEN          — npm automation token (read+write, scoped to package)
#   REGISTRY_TOKEN     — GitHub PAT with write:packages (or Docker Hub token)
# ==============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # needed for npm provenance

jobs:
  # ---------------------------------------------------------------------------
  # Release identity — the git tag, npm package, and image versions must agree
  # ---------------------------------------------------------------------------
  validate-release:
    name: Validate Release Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Match semver tag to package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node --input-type=module -e "import fs from 'node:fs'; console.log(JSON.parse(fs.readFileSync('package.json', 'utf8')).version)")

          if [[ ! "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag '$GITHUB_REF_NAME'; expected v<semver>"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Release version mismatch: tag=$TAG_VERSION package.json=$PACKAGE_VERSION"
            exit 1
          fi

          echo "Release version validated: $PACKAGE_VERSION"

  # ---------------------------------------------------------------------------
  # Secret scanning — fail fast if any credential leaks into git history
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    needs: [validate-release]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for complete scan

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # npm tarball audit — fail if any file outside the allowlisted roots ships
  # ---------------------------------------------------------------------------
  tarball-audit:
    name: npm Tarball Audit
    runs-on: ubuntu-latest
    needs: [validate-release]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Audit npm pack file list
        run: node scripts/auditNpmPack.mjs | tee npm-pack-files.txt

      - name: Upload file list artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-pack-files
          path: npm-pack-files.txt

  # ---------------------------------------------------------------------------
  # npm publish — provenance-attested, automation-token auth
  # ---------------------------------------------------------------------------
  npm-publish:
    name: npm Publish
    runs-on: ubuntu-latest
    needs: [validate-release, gitleaks, tarball-audit]
    environment: npm-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # Docker runtime image — build → scan → push (scan gates the push)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build & Push (runtime)
    runs-on: ubuntu-latest
    needs: [validate-release, gitleaks, tarball-audit]
    steps:
      - uses: actions/checkout@v4

      # --- Build dist/ before the image build (the runtime Dockerfile
      #     COPY dist/ ./dist/ so dist/ must exist at build time) ---
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      # --- Lint the Dockerfile ---
      - uses: hadolint/hadolint-action@v3
        with:
          dockerfile: Dockerfile

      # --- Set up Docker buildx ---
      - uses: docker/setup-buildx-action@v3

      # --- Log in to registry ---
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      # --- Derive lowercase image reference (raw github.repository may
      #     contain uppercase, which GHCR rejects) ---
      - name: Derive lowercase image reference
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      # --- Extract metadata for tags & labels ---
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # --- Build image locally (push: false, load: true) for scanning.
      #     load: true requires single-platform — this is intentional; we
      #     only build linux/amd64. ---
      - uses: docker/build-push-action@v6
        id: build-scan
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: local/formic-scan:runtime

      # --- Scan the locally built image BEFORE pushing. A HIGH or CRITICAL
      #     finding fails the job, preventing a vulnerable image from
      #     reaching GHCR. ---
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: local/formic-scan:runtime
          format: 'table'
          exit-code: '1'
          ignore-unfixed: false
          severity: 'HIGH,CRITICAL'

      # --- Push on clean scan. buildx layer caching makes this second
      #     build a no-op rebuild. ---
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true

  # ---------------------------------------------------------------------------
  # Docker devcontainer image — depends on npm-publish (installs Formic from
  # the registry), polls npm for propagation, and uses scan-before-push.
  # ---------------------------------------------------------------------------
  devcontainer:
    name: Docker Build & Push (devcontainer)
    runs-on: ubuntu-latest
    needs: [validate-release, gitleaks, tarball-audit, npm-publish]
    steps:
      - uses: actions/checkout@v4

      # --- Build dist/ (needed for COPY in the devcontainer Dockerfile
      #     if it includes runtime assets) ---
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      # --- Lint the devcontainer Dockerfile ---
      - uses: hadolint/hadolint-action@v3
        with:
          dockerfile: Dockerfile.devcontainer

      # --- Derive FORMIC_VERSION from the git tag ---
      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # --- Poll npm registry until the published version is available.
      #     npm publish returning success does not guarantee immediate
      #     availability; the package must be installable before we build
      #     the devcontainer image (which runs `npm install -g @rickywo/formic@<version>`). ---
      - name: Wait for npm registry propagation
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          for i in $(seq 1 10); do
            PUBLISHED=$(npm view @rickywo/formic@${VERSION} version 2>/dev/null || echo "")
            if [ "$PUBLISHED" = "$VERSION" ]; then
              echo "✅ @rickywo/formic@${VERSION} is available on npm"
              exit 0
            fi
            echo "⏳ Attempt $i/10: @rickywo/formic@${VERSION} not yet available, waiting 30s..."
            sleep 30
          done
          echo "❌ @rickywo/formic@${VERSION} not found on npm registry after 10 attempts"
          exit 1

      # --- Set up Docker buildx ---
      - uses: docker/setup-buildx-action@v3

      # --- Log in to registry ---
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      # --- Derive lowercase image reference ---
      - name: Derive lowercase image reference
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      # --- Extract metadata for tags & labels ---
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            suffix=-devcontainer
          tags: |
            type=semver,pattern={{version}}

      # --- Build locally for scanning ---
      - uses: docker/build-push-action@v6
        id: build-scan
        with:
          context: .
          file: Dockerfile.devcontainer
          push: false
          load: true
          build-args: |
            FORMIC_VERSION=${{ steps.version.outputs.value }}
          tags: local/formic-scan:devcontainer

      # --- Scan before push ---
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: local/formic-scan:devcontainer
          format: 'table'
          exit-code: '1'
          ignore-unfixed: false
          severity: 'HIGH,CRITICAL'

      # --- Push on clean scan ---
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.devcontainer
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FORMIC_VERSION=${{ steps.version.outputs.value }}
          sbom: true
          provenance: true

  # ---------------------------------------------------------------------------
  # Summary — reports actual job results, prints a success banner only when
  # all three publish jobs (npm, docker, devcontainer) succeeded.
  # ---------------------------------------------------------------------------
  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [npm-publish, docker, devcontainer]
    if: always()
    steps:
      - name: Summary
        run: |
          {
            echo "## 🚀 Release ${{ github.ref_name }}"
            echo ""
            echo "| Job | Result |"
            echo "| --- | ------ |"
            echo "| npm publish | ${{ needs.npm-publish.result }} |"
            echo "| docker (runtime) | ${{ needs.docker.result }} |"
            echo "| docker (devcontainer) | ${{ needs.devcontainer.result }} |"
            echo ""
            echo "- npm:  https://www.npmjs.com/package/@rickywo/formic"
            echo "- GHCR: https://github.com/${{ github.repository }}/pkgs/container/formic"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.npm-publish.result }}" = "success" ] \
            && [ "${{ needs.docker.result }}" = "success" ] \
            && [ "${{ needs.devcontainer.result }}" = "success" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ Release complete" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️  Release incomplete — check failed jobs above" >> "$GITHUB_STEP_SUMMARY"
          fi
