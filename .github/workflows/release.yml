# ==============================================================================
# Formic Release Pipeline
# ==============================================================================
# Triggered on version tags (v*) only. Gates every publish on:
#   1. Secret scanning (gitleaks over full history)
#   2. npm tarball allowlist audit
#   3. npm publish --provenance --access public
#   4. Dockerfile linting (hadolint) and image scanning (trivy)
#   5. Multi-arch Docker buildx with SBOM + provenance, pushing:
#      <version>, <version>-devcontainer, and latest (on semver tags only)
#
# Required secrets:
#   NPM_TOKEN          — npm automation token (read+write, scoped to package)
#   REGISTRY_TOKEN     — GitHub PAT with write:packages (or Docker Hub token)
# ==============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # needed for npm provenance

jobs:
  # ---------------------------------------------------------------------------
  # Secret scanning — fail fast if any credential leaks into git history
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for complete scan

      - uses: gitleaks/gitleaks-action@v2
        with:
          config-path: '.gitleaks.toml'

  # ---------------------------------------------------------------------------
  # npm tarball audit — fail if any file outside the allowlisted roots ships
  # ---------------------------------------------------------------------------
  tarball-audit:
    name: npm Tarball Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Audit npm pack file list
        run: node scripts/auditNpmPack.mjs

      - name: Upload file list artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-pack-files
          path: |
            # The audit script prints the file list to stdout; we capture it
            # via a redirect in a separate step if needed.  For now the
            # artifact is the audit output as logged by GitHub Actions.

  # ---------------------------------------------------------------------------
  # npm publish — provenance-attested, automation-token auth
  # ---------------------------------------------------------------------------
  npm-publish:
    name: npm Publish
    runs-on: ubuntu-latest
    needs: [gitleaks, tarball-audit]
    environment: npm-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # Docker image lint + scan + build + push
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [gitleaks, tarball-audit]
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - { file: Dockerfile, suffix: '' }
          - { file: Dockerfile.devcontainer, suffix: '-devcontainer' }
    steps:
      - uses: actions/checkout@v4

      # --- Lint the Dockerfile ---
      - uses: hadolint/hadolint-action@v3
        with:
          dockerfile: ${{ matrix.dockerfile.file }}

      # --- Set up Docker buildx ---
      - uses: docker/setup-buildx-action@v3

      # --- Log in to registry ---
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      # --- Extract metadata for tags & labels ---
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            suffix=${{ matrix.dockerfile.suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ matrix.dockerfile.suffix == '' }}

      # --- Build image with SBOM + provenance ---
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ${{ matrix.dockerfile.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true

      # --- Scan built image with trivy ---
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}${{ matrix.dockerfile.suffix }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: false
          severity: 'HIGH,CRITICAL'

  # ---------------------------------------------------------------------------
  # Summary — optional, prints a success banner
  # ---------------------------------------------------------------------------
  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [npm-publish, docker]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🚀 Release ${{ github.ref_name }} complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- npm:  https://www.npmjs.com/package/@rickywo/formic" >> "$GITHUB_STEP_SUMMARY"
          echo "- GHCR: https://github.com/${{ github.repository }}/pkgs/container/formic" >> "$GITHUB_STEP_SUMMARY"
